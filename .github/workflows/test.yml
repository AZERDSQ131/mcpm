name: Test

on:
  pull_request:
    paths:
      - "packages/cli/**"
  push:
    branches: [main]
    paths:
      - "packages/cli/**"

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: packages/cli
        run: npm install

      - name: Run tests
        working-directory: packages/cli
        run: npm test --if-present
